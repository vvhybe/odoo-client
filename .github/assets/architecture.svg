<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" width="860" height="500">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="860" height="500" rx="12" fill="#0D1117"/>

  <!-- ── Consumer layer ──────────────────────────────────────── -->
  <rect x="30" y="24" width="800" height="60" rx="10"
    fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="430" y="50" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="13" font-weight="600" fill="#E6EDF3">Consumer apps</text>
  <text x="430" y="70" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="11" fill="#8B949E">Next.js  ·  React  ·  Node.js  ·  Express  ·  Any JS runtime</text>

  <!-- Arrow down -->
  <line x1="430" y1="84" x2="430" y2="110" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── OdooConnect facade ──────────────────────────────────── -->
  <rect x="190" y="110" width="480" height="58" rx="10"
    fill="#0F6E56" fill-opacity="0.18" stroke="#1D9E75" stroke-width="1" stroke-opacity="0.6"/>
  <text x="430" y="135" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="13" font-weight="700" fill="#5DCAA5">OdooConnect</text>
  <text x="430" y="155" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="11" fill="#0F6E56">Main facade  ·  config  ·  session  ·  unified API</text>

  <!-- Arrows to services row -->
  <line x1="280" y1="168" x2="195" y2="214" stroke="#444" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="430" y1="168" x2="430" y2="214" stroke="#444" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="580" y1="168" x2="665" y2="214" stroke="#444" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── Services row ───────────────────────────────────────── -->
  <!-- AuthService -->
  <rect x="30" y="214" width="200" height="64" rx="8"
    fill="#26215C" fill-opacity="0.35" stroke="#534AB7" stroke-width="1" stroke-opacity="0.6"/>
  <text x="130" y="238" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="12" font-weight="600" fill="#AFA9EC">AuthService</text>
  <text x="130" y="256" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#534AB7">session  ·  api key  ·  uid</text>
  <text x="130" y="270" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#3C3489">retry · timeout</text>

  <!-- OrmService -->
  <rect x="330" y="214" width="200" height="64" rx="8"
    fill="#0F6E56" fill-opacity="0.2" stroke="#1D9E75" stroke-width="1" stroke-opacity="0.6"/>
  <text x="430" y="238" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="12" font-weight="600" fill="#5DCAA5">OrmService</text>
  <text x="430" y="256" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#1D9E75">searchRead  ·  CRUD  ·  batch</text>
  <text x="430" y="270" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#0F6E56">paginate  ·  nameSearch</text>

  <!-- ReportService (roadmap) -->
  <rect x="630" y="214" width="200" height="64" rx="8"
    fill="#1a1d24" stroke="#2D333B" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="730" y="238" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="12" font-weight="600" fill="#444C56">ReportService</text>
  <text x="730" y="256" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#373E47">PDF  ·  XLSX  ·  render</text>
  <text x="730" y="272" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#30363D">roadmap</text>

  <!-- Arrows to client row -->
  <line x1="100" y1="278" x2="100" y2="322" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr-purple)"/>
  <line x1="380" y1="278" x2="210" y2="322" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr-teal)"/>
  <line x1="480" y1="278" x2="560" y2="322" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr-teal)"/>

  <!-- ── Client layer ───────────────────────────────────────── -->
  <!-- JsonRpcClient -->
  <rect x="30" y="322" width="300" height="64" rx="8"
    fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="180" y="346" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="12" font-weight="600" fill="#E6EDF3">JsonRpcClient</text>
  <text x="180" y="363" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#8B949E">/web/dataset/call_kw</text>
  <text x="180" y="377" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#8B949E">/web/session/authenticate</text>

  <!-- XmlRpcClient -->
  <rect x="420" y="322" width="300" height="64" rx="8"
    fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="570" y="346" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="12" font-weight="600" fill="#E6EDF3">XmlRpcClient</text>
  <text x="570" y="363" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#8B949E">/xmlrpc/2/common</text>
  <text x="570" y="377" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#8B949E">/xmlrpc/2/object</text>

  <!-- Arrow to Odoo -->
  <line x1="180" y1="386" x2="344" y2="430" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <line x1="570" y1="386" x2="516" y2="430" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- ── Shared infra strip ─────────────────────────────────── -->
  <text x="750" y="344" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#444C56">shared infra</text>
  <rect x="750" y="352" width="80" height="30" rx="6"
    fill="#161B22" stroke="#21262D" stroke-width="0.8"/>
  <text x="790" y="372" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#8B949E">retry</text>

  <rect x="750" y="388" width="80" height="30" rx="6"
    fill="#161B22" stroke="#21262D" stroke-width="0.8"/>
  <text x="790" y="408" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#8B949E">errors</text>

  <!-- ── Odoo instance ─────────────────────────────────────── -->
  <rect x="180" y="430" width="380" height="54" rx="10"
    fill="#26215C" fill-opacity="0.25" stroke="#534AB7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="370" y="453" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="13" font-weight="700" fill="#AFA9EC">Odoo instance</text>
  <text x="370" y="472" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#534AB7">v14  ·  v15  ·  v16  ·  v17  ·  v18  ·  v19</text>

  <!-- TypeScript types badge -->
  <rect x="30" y="110" width="148" height="28" rx="6"
    fill="#26215C" fill-opacity="0.5" stroke="#534AB7" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="104" y="129" text-anchor="middle" font-family="'SF Mono',monospace"
    font-size="10" fill="#AFA9EC">full TypeScript types</text>

  <!-- Outer border -->
  <rect x="0" y="0" width="860" height="500" rx="12" fill="none" stroke="#21262D" stroke-width="1"/>
</svg>
