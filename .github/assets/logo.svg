<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="icon-clip">
      <rect x="0" y="0" width="200" height="200" rx="44"/>
    </clipPath>
    <filter id="glow-teal" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="200" height="200" rx="44" fill="#0D1117"/>

  <!-- Subtle grid texture -->
  <g clip-path="url(#icon-clip)" opacity="0.04">
    <line x1="40" y1="0" x2="40" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="200" y2="40" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="200" y2="80" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="200" y2="120" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="200" y2="160" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Left ring — teal (Node.js / JavaScript side) -->
  <circle cx="82" cy="100" r="36" fill="none" stroke="#1D9E75" stroke-width="9" opacity="0.15"/>
  <circle cx="82" cy="100" r="36" fill="none" stroke="#1D9E75" stroke-width="7"
    stroke-dasharray="226.2" stroke-dashoffset="56.5"
    transform="rotate(-90 82 100)"/>

  <!-- Right ring — purple (Odoo side) -->
  <circle cx="118" cy="100" r="36" fill="none" stroke="#534AB7" stroke-width="9" opacity="0.15"/>
  <circle cx="118" cy="100" r="36" fill="none" stroke="#7F77DD" stroke-width="7"
    stroke-dasharray="226.2" stroke-dashoffset="56.5"
    transform="rotate(90 118 100)"/>

  <!-- Connection bridge at overlap center -->
  <circle cx="100" cy="100" r="5" fill="#ffffff" opacity="0.9"/>

  <!-- Left node -->
  <circle cx="62" cy="100" r="5.5" fill="#1D9E75"/>

  <!-- Right node -->
  <circle cx="138" cy="100" r="5.5" fill="#7F77DD"/>

  <!-- Top connection hint -->
  <circle cx="100" cy="64" r="3" fill="#ffffff" opacity="0.25"/>
  <!-- Bottom connection hint -->
  <circle cx="100" cy="136" r="3" fill="#ffffff" opacity="0.25"/>

  <!-- Outer border glow -->
  <rect x="1" y="1" width="198" height="198" rx="43" fill="none" stroke="#1D9E75" stroke-width="0.5" opacity="0.3"/>
</svg>
